---
# =============================================================================
# device_site_assignment.yml — Device <-> Site Association
# =============================================================================
# Manages device-to-site associations in Classic Central.
#
# Tags:
#   [assign_site]   Associate devices to their site  (serials optional)
#   [unassign_site] Remove devices from their site   (serials required)
#
# Usage:
#   # Associate all devices to their site
#   ansible-playbook device_site_assignment.yml --tags assign_site
#
#   # Associate a single device
#   ansible-playbook device_site_assignment.yml --tags assign_site -e serials=SG03KW500G
#
#   # Associate multiple devices
#   ansible-playbook device_site_assignment.yml --tags assign_site -e "serials=SG03KW500G,SG3ALN0004"
#
#   # Remove devices from their site (serials required)
#   ansible-playbook device_site_assignment.yml --tags unassign_site -e serials=SG03KW500G
#   ansible-playbook device_site_assignment.yml --tags unassign_site -e "serials=SG03KW500G,CNQBLPQ0FF"
# =============================================================================

- name: HPE Aruba Central — Device Site Assignment
  hosts: localhost
  gather_facts: false
  connection: local

  vars_files:
    - vault.yml
    - devices.yml

  vars:
    classic_central_base_url: "https://eu-apigw.central.arubanetworks.com"
    vault_file:               "{{ playbook_dir }}/vault.yml"
    vault_encrypted:          false
    _serial_list: "{{ serials.split(',') | map('trim') | list if serials is defined else [] }}"
    target_devices: >-
      {{ devices | selectattr('serial_number', 'in', _serial_list) | list
         if _serial_list | length > 0 else [] }}


  tasks:

    # =========================================================================
    # ASSIGN DEVICE TO SITE
    # PRE-FLIGHT — Sync refresh token from file to var if available
    # Prevents using a stale vault token when /tmp/.central_refresh_token exists
    # =========================================================================
    - name: "Classic Central | Check if token file exists"
      stat:
        path: "/tmp/.central_refresh_token"
      register: _token_file_stat
      tags: [assign_site]

    - name: "Classic Central | Load token from file if available"
      set_fact:
        classic_central_refresh_token: "{{ lookup('file', '/tmp/.central_refresh_token') | trim }}"
      when: _token_file_stat.stat.exists | default(false)
      tags: [assign_site]

    # =========================================================================
    # Classic Central auth — single call, token reused for association
    # serials optional — defaults to all devices if not specified
    # =========================================================================
    - name: "Classic Central | Query sites"
      workflow.aruba_central.central_site_devices:
        base_url: "{{ classic_central_base_url }}"
        state: query
        client_id: "{{ classic_central_client_id }}"
        client_secret: "{{ classic_central_client_secret }}"
        customer_id: "{{ classic_central_customer_id }}"
        refresh_token: "{{ classic_central_refresh_token | default('') }}"
        username: "{{ classic_central_username | default(omit) }}"
        password: "{{ classic_central_password | default(omit) }}"
      register: sites_query
      tags: [assign_site]

    - name: "Classic Central | Build site name -> site_id lookup"
      set_fact:
        classic_site_id_map: "{{ sites_query.sites | items2dict(key_name='site_name', value_name='site_id') }}"
      tags: [assign_site]

    - name: "Classic Central | Display site lookup map"
      debug:
        msg: "Site map: {{ classic_site_id_map }}"
      tags: [assign_site]

    - name: "Write device site grouping script"
      copy:
        dest: "/tmp/group_devices_site.py"
        content: |
          #!/usr/bin/env python3
          import json
          with open('/tmp/devices_site.json') as f:
              devices = json.load(f)
          dtype_map = {'AP': 'IAP', 'SWITCH': 'SWITCH', 'GATEWAY': 'CONTROLLER'}
          groups = {}
          for d in devices:
              dtype = dtype_map.get(d['device_type'], d['device_type'])
              key = (d['site'], dtype)
              groups.setdefault(key, []).append(str(d['serial_number']))
          result = [{'site': k[0], 'device_type': k[1], 'serials': v} for k, v in groups.items()]
          print(json.dumps({'groups': result}))
        mode: '0755'
      tags: [assign_site]

    - name: "Write devices to JSON for site grouping"
      copy:
        dest: "/tmp/devices_site.json"
        content: "{{ (target_devices if target_devices | length > 0 else devices) | to_json }}"
      tags: [assign_site]

    - name: "Run site grouping script"
      command: python3 /tmp/group_devices_site.py
      register: site_groups_raw
      tags: [assign_site]

    - name: "Set site_device_groups fact"
      set_fact:
        site_device_groups: "{{ (site_groups_raw.stdout | from_json).groups }}"
      tags: [assign_site]

    - name: "Classic Central | Associate devices to site"
      workflow.aruba_central.central_site_devices:
        base_url: "{{ classic_central_base_url }}"
        state: present
        client_id: "{{ classic_central_client_id }}"
        client_secret: "{{ classic_central_client_secret }}"
        customer_id: "{{ classic_central_customer_id }}"
        refresh_token: "{{ lookup('file', '/tmp/.central_refresh_token') | default('') }}"
        username: "{{ classic_central_username | default(omit) }}"
        password: "{{ classic_central_password | default(omit) }}"
        site_id: "{{ classic_site_id_map[item.site] }}"
        site_name: "{{ item.site }}"
        device_type: "{{ item.device_type }}"
        device_serials: "{{ item.serials }}"
      loop: "{{ site_device_groups }}"
      loop_control:
        label: "{{ item.site }} | {{ item.device_type }}"
      register: assign_site_results
      tags: [assign_site]

    - name: "Display site assignment results"
      debug:
        msg: "{{ item.msg | default('skipped') }}"
      loop: "{{ assign_site_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item.site | default('?') }}"
      tags: [assign_site]

    # =========================================================================
    # UNASSIGN DEVICE FROM SITE
    # All tasks tagged never — must be called explicitly
    # serials required — guard prevents accidental mass unassign
    # Dedicated Classic Central auth call — independent from assign_site
    # =========================================================================
    - name: "Central | Assert serials is defined for unassign_site (safety check)"
      assert:
        that:
          - serials is defined
          - serials | length > 0
        fail_msg: >-
          ERROR: you must specify at least one device using -e serials=<SERIAL>[,<SERIAL>].
          Example: ansible-playbook device_site_assignment.yml --tags unassign_site -e serials=SG03KW500G
          This guard prevents accidentally removing all devices from their site.
        success_msg: "Target devices: {{ _serial_list | join(', ') }}"
      tags: [never, unassign_site]

    - name: "Classic Central | Query sites for unassign"
      workflow.aruba_central.central_site_devices:
        base_url: "{{ classic_central_base_url }}"
        state: query
        client_id: "{{ classic_central_client_id }}"
        client_secret: "{{ classic_central_client_secret }}"
        customer_id: "{{ classic_central_customer_id }}"
        refresh_token: "{{ lookup('file', '/tmp/.central_refresh_token') | default('') }}"
        username: "{{ classic_central_username | default(omit) }}"
        password: "{{ classic_central_password | default(omit) }}"
      register: _unassign_sites_query
      tags: [never, unassign_site]

    - name: "Classic Central | Build site_id map for unassign"
      set_fact:
        classic_site_id_map: >-
          {{ _unassign_sites_query.sites
             | items2dict(key_name='site_name', value_name='site_id') }}
      tags: [never, unassign_site]

    - name: "Write device site unassign grouping script"
      copy:
        dest: "/tmp/group_devices_unassign_site.py"
        content: |
          #!/usr/bin/env python3
          import json
          with open('/tmp/devices_unassign_site.json') as f:
              devices = json.load(f)
          dtype_map = {'AP': 'IAP', 'SWITCH': 'SWITCH', 'GATEWAY': 'CONTROLLER'}
          groups = {}
          for d in devices:
              dtype = dtype_map.get(d['device_type'], d['device_type'])
              key = (d['site'], dtype)
              groups.setdefault(key, []).append(str(d['serial_number']))
          result = [{'site': k[0], 'device_type': k[1], 'serials': v} for k, v in groups.items()]
          print(json.dumps({'groups': result}))
        mode: '0755'
      tags: [never, unassign_site]

    - name: "Write devices to JSON for site unassign grouping"
      copy:
        dest: "/tmp/devices_unassign_site.json"
        content: "{{ target_devices | to_json }}"
      tags: [never, unassign_site]

    - name: "Run site unassign grouping script"
      command: python3 /tmp/group_devices_unassign_site.py
      register: unassign_site_groups_raw
      tags: [never, unassign_site]

    - name: "Set unassign_site_device_groups fact"
      set_fact:
        unassign_site_device_groups: "{{ (unassign_site_groups_raw.stdout | from_json).groups }}"
      tags: [never, unassign_site]

    - name: "Classic Central | Remove devices from site"
      workflow.aruba_central.central_site_devices:
        base_url: "{{ classic_central_base_url }}"
        state: absent
        client_id: "{{ classic_central_client_id }}"
        client_secret: "{{ classic_central_client_secret }}"
        customer_id: "{{ classic_central_customer_id }}"
        refresh_token: "{{ lookup('file', '/tmp/.central_refresh_token') | default('') }}"
        username: "{{ classic_central_username | default(omit) }}"
        password: "{{ classic_central_password | default(omit) }}"
        site_id: "{{ classic_site_id_map[item.site] }}"
        site_name: "{{ item.site }}"
        device_type: "{{ item.device_type }}"
        device_serials: "{{ item.serials }}"
      loop: "{{ unassign_site_device_groups }}"
      loop_control:
        label: "{{ item.site }} | {{ item.device_type }}"
      register: unassign_site_results
      tags: [never, unassign_site]

    - name: "Display site unassignment results"
      debug:
        msg: "{{ item.msg | default('skipped') }}"
      loop: "{{ unassign_site_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item.site | default('?') }}"
      tags: [never, unassign_site]

    # =========================================================================
    # SAVE REFRESH TOKEN
    # =========================================================================
    - name: "Read new refresh token from temp file"
      slurp:
        src: "/tmp/.central_refresh_token"
      register: _token_file
      tags: [assign_site, unassign_site]

    - name: "Set new refresh token fact"
      set_fact:
        _new_refresh_token: "{{ _token_file.content | b64decode | trim }}"
      tags: [assign_site, unassign_site]

    - name: "Vault | Decrypt vault.yml"
      command: ansible-vault decrypt {{ vault_file }} --vault-password-file {{ vault_password_file }}
      changed_when: false
      when: vault_encrypted | bool
      tags: [assign_site, unassign_site]

    - name: "Vault | Update classic_central_refresh_token in vault.yml"
      replace:
        path: "{{ vault_file }}"
        regexp: '^classic_central_refresh_token:.*$'
        replace: 'classic_central_refresh_token: "{{ _new_refresh_token }}"'
      tags: [assign_site, unassign_site]

    - name: "Vault | Re-encrypt vault.yml"
      command: ansible-vault encrypt {{ vault_file }} --vault-password-file {{ vault_password_file }}
      changed_when: false
      when: vault_encrypted | bool
      tags: [assign_site, unassign_site]