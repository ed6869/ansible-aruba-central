---
# =============================================================================
# devices.yml - Input file for GLP Onboarding
# =============================================================================
# Fill in one block per device to onboard.
# Each device must have its own subscription_key (found in GLP portal).
# Supported device_type values: SWITCH, AP, GATEWAY
#
# glp.tags (optional): Key/value pairs applied to the device in GLP.
#   Set a value to null to remove a tag.
#   Tags are searchable/filterable in the GLP portal.
# =============================================================================

devices:
  - serial_number: SG03KW500G
    mac_address: b8:d4:e7:0d:52:40
    device_type: SWITCH
    persona: ACCESS_SWITCH
    device_group: Ansible_Onboarding
    site: Paris-HQ
    glp:
      region: eu-central
      subscription_key: E6FF23F6C1986469AB
